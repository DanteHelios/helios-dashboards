<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Card Archetypes</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
  <div style="background:#fff;border:1px solid #F5F5F5;border-radius:32px;padding:24px;">
    <span style="display:inline-block;padding:6px 14px;border-radius:9999px;background:rgba(19,133,16,0.10);color:#138510;font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;">Partner Focus</span>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:24px;color:#171717;margin-bottom:6px;">Retainer</div>
    <p style="font-family:var(--font-body);font-weight:300;font-size:14px;color:#525252;margin:0;line-height:1.55;">Continuous, high-output AI engines built into your daily ops.</p>
  </div>
  <div style="background:#171717;border:1px solid #262626;border-radius:32px;padding:24px;color:#fff;">
    <span style="display:inline-block;padding:6px 14px;border-radius:9999px;background:rgba(255,94,26,0.20);color:#FF5E1A;font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;">Build &amp; Scale</span>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:24px;margin-bottom:6px;">One-Off Project</div>
    <p style="font-family:var(--font-body);font-weight:300;font-size:14px;color:#A3A3A3;margin:0;line-height:1.55;">Laser-focused builds for specific bottlenecks.</p>
  </div>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:10px;">Premium service cards: --radius-2xl (32px). Light/dark pair, generous internal padding.</div>
</body></html>
