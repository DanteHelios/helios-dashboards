<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  body{padding:20px 24px;}
  .row{display:flex;gap:14px;align-items:stretch;}
  .swatch{flex:1;min-width:0;border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px;border:1px solid var(--border-soft);}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.02em;}
  .swatch .hex{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;opacity:.85;}
  .label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;}
</style></head><body>
<div class="label">Brand Accents</div>
<div class="row">
  <div class="swatch" style="background:#FF5E1A;color:#fff;border:none;">
    <span class="name">Helios Orange</span>
    <span class="hex">#FF5E1A · --helios-orange · primary CTA + hover</span>
  </div>
  <div class="swatch" style="background:#138510;color:#fff;border:none;">
    <span class="name">Helios Green</span>
    <span class="hex">#138510 · --helios-green · eyebrows + tags</span>
  </div>
  <div class="swatch" style="background:linear-gradient(180deg,#FF8A4F,#FF5E1A 50%,#E63946);color:#fff;border:none;">
    <span class="name">Logo Sun Gradient</span>
    <span class="hex">#FF8A4F → #FF5E1A → #E63946</span>
  </div>
</div></body></html>
