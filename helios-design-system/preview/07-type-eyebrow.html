<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  body{padding:20px 24px;}
  .row{display:flex;gap:14px;align-items:stretch;}
  .swatch{flex:1;min-width:0;border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px;border:1px solid var(--border-soft);}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.02em;}
  .swatch .hex{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;opacity:.85;}
  .label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;}

<div class="label">Eyebrow Labels (uppercase + tracking-widest)</div>
<div style="display:flex;flex-direction:column;gap:10px;">
  <div style="font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#138510;">THE HELIOS FOUNDATION</div>
  <div style="font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#138510;">PARTNER FOCUS · BUILD &amp; SCALE</div>
  <div style="font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#FF5E1A;">PROVEN RESULTS</div>
  <div style="font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#171717;">READY TO SCALE?</div>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:10px;">13px · weight 700 · tracking 0.18em · usually green; orange for emphasis; ink for closers</div>
</body></html>
