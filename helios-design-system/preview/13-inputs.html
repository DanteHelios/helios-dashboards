<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Form Inputs</div>
<div style="display:flex;flex-direction:column;gap:14px;max-width:480px;">
  <div style="position:relative;">
    <input placeholder="Message us..." style="width:100%;box-sizing:border-box;background:#262626;border:1px solid #404040;border-radius:9999px;padding:14px 56px 14px 20px;color:#fff;font-family:var(--font-body);font-size:14px;outline:none;">
    <button style="all:unset;cursor:pointer;position:absolute;right:6px;top:6px;width:38px;height:38px;background:#FF5E1A;color:#fff;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:18px;">→</button>
  </div>
  <input placeholder="you@brand.com" style="width:100%;box-sizing:border-box;background:#fff;border:1px solid #E5E5E5;border-radius:8px;padding:12px 16px;color:#171717;font-family:var(--font-body);font-size:14px;outline:none;">
  <textarea placeholder="Tell us about your bottleneck…" style="width:100%;box-sizing:border-box;background:#fff;border:1px solid #E5E5E5;border-radius:12px;padding:12px 16px;color:#171717;font-family:var(--font-body);font-size:14px;outline:none;resize:none;height:60px;"></textarea>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:10px;">Footer "Message us" = pill on dark · standard form fields = 8–12px radius on white</div>
</body></html>
