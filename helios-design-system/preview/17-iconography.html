<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Iconography — lucide-react @ 2px stroke</div>
<div style="display:flex;gap:22px;flex-wrap:wrap;align-items:center;color:#171717;">

  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="arrow-right" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">arrow-right</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="chevron-right" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">chevron-right</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="check-circle-2" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">check-circle-2</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="linkedin" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">linkedin</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="instagram" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">instagram</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="plus" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">plus</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="minus" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">minus</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="menu" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">menu</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="x" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">x</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="mail" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">mail</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="play" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">play</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <i data-lucide="sparkles" style="width:24px;height:24px;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-3);">sparkles</span>
  </div>
</div>
<div style="margin-top:14px;display:flex;gap:14px;align-items:center;">
  <div style="display:flex;align-items:center;gap:8px;color:#138510;"><i data-lucide="check-circle-2" style="width:20px;height:20px;"></i><span style="font-weight:500;font-size:14px;color:#171717;">Video and Static Content Engines</span></div>
  <div style="color:#FF5E1A;display:flex;align-items:center;gap:8px;"><i data-lucide="check-circle-2" style="width:20px;height:20px;"></i><span style="font-weight:500;font-size:14px;color:#fff;background:#171717;padding:4px 10px;border-radius:6px;">Custom AI Agents</span></div>
</div>
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
