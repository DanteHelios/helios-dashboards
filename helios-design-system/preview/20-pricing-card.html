<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Pricing Tile</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">

  <div style="background:#fff;color:#171717;border:1px solid #F5F5F5;border-radius:24px;padding:18px;position:relative;">
    
    <div style="font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.18em;color:#138510;">STARTER</div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:32px;margin-top:6px;letter-spacing:-0.02em;">$950<span style="font-size:13px;font-weight:400;color:#737373;"> /mo</span></div>
    <div style="font-family:var(--font-body);font-weight:300;font-size:12px;color:#525252;margin-top:8px;line-height:1.5;">30 STATICS/WEEK</div>
  </div>
  <div style="background:#171717;color:#fff;border:1px solid #262626;border-radius:24px;padding:18px;position:relative;">
    <span style="position:absolute;top:14px;right:14px;background:#FF5E1A;color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:9999px;">Popular</span>
    <div style="font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.18em;color:#FF5E1A;">GROWTH</div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:32px;margin-top:6px;letter-spacing:-0.02em;">$1,250<span style="font-size:13px;font-weight:400;color:#A3A3A3;"> /mo</span></div>
    <div style="font-family:var(--font-body);font-weight:300;font-size:12px;color:#A3A3A3;margin-top:8px;line-height:1.5;">50 STATICS/WEEK</div>
  </div>
  <div style="background:#fff;color:#171717;border:1px solid #F5F5F5;border-radius:24px;padding:18px;position:relative;">
    
    <div style="font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.18em;color:#138510;">SCALE</div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:32px;margin-top:6px;letter-spacing:-0.02em;">$2,150<span style="font-size:13px;font-weight:400;color:#737373;"> /mo</span></div>
    <div style="font-family:var(--font-body);font-weight:300;font-size:12px;color:#525252;margin-top:8px;line-height:1.5;">100 STATICS/WEEK</div>
  </div>
</div>
</body></html>
