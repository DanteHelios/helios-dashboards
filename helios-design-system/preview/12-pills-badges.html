<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Pills, Badges &amp; Eyebrow Tags</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
  <span style="display:inline-flex;padding:6px 16px;border-radius:9999px;background:rgba(19,133,16,0.10);color:#138510;font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;">Partner Focus</span>
  <span style="display:inline-flex;padding:6px 16px;border-radius:9999px;background:rgba(255,94,26,0.20);color:#FF5E1A;font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;">Build &amp; Scale</span>
  <span style="display:inline-flex;padding:4px 12px;border-radius:9999px;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);color:#171717;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;border:1px solid #E5E5E5;">AI Tool</span>
  <span style="display:inline-flex;padding:4px 12px;border-radius:9999px;background:#171717;color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;">Coming Soon</span>
  <span style="display:inline-flex;padding:4px 12px;border-radius:9999px;background:linear-gradient(90deg,#FF5E1A,#FF8A4F);color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;">Premiere</span>
  <span style="display:inline-flex;padding:4px 12px;border-radius:9999px;background:#FF5E1A;color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;">Popular</span>
</div>
</body></html>
