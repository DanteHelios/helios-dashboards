<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Corner Radius</div>
<div style="display:flex;gap:16px;align-items:flex-end;">
  
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:6px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-sm</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">6px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:12px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-md</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">12px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:16px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-lg</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">16px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:24px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-xl</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">24px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:32px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-2xl</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">32px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div style="width:80px;height:60px;background:#171717;border-radius:9999px;"></div>
    <div style="font-family:var(--font-heading);font-size:11px;font-weight:700;">--radius-pill</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);">9999</div>
  </div>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:12px;">Buttons + badges: pill. Premium service cards: 2xl. Default cards: lg. Inputs: md.</div>
</body></html>
