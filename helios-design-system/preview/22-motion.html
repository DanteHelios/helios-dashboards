<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Motion — Scroll Reveal · Hover · Stagger</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start;">
  <div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:13px;margin-bottom:6px;">Scroll-in</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);line-height:1.6;">opacity 0→1<br>y 20→0<br>duration 600ms<br>ease-out</div>
  </div>
  <div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:13px;margin-bottom:6px;">Stagger</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);line-height:1.6;">delay = idx * 100ms<br>cascade in grids</div>
  </div>
  <div>
    <div style="font-family:var(--font-heading);font-weight:700;font-size:13px;margin-bottom:6px;">Image hover</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);line-height:1.6;">scale 1→1.05<br>duration 1000ms<br>grayscale→0 (portraits)</div>
  </div>
</div>
<div style="margin-top:12px;display:flex;gap:10px;">
  <span style="background:#FF5E1A;color:#fff;padding:6px 14px;border-radius:9999px;font-size:11px;font-weight:600;cursor:pointer;transition:transform .15s ease;">hover:scale-105</span>
  <span style="color:#525252;font-size:13px;cursor:pointer;transition:color .2s;">link → <span style="color:#FF5E1A;">#FF5E1A</span></span>
</div>
</body></html>
