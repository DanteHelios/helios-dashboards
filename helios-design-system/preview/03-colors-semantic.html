<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  body{padding:20px 24px;}
  .row{display:flex;gap:14px;align-items:stretch;}
  .swatch{flex:1;min-width:0;border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px;border:1px solid var(--border-soft);}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.02em;}
  .swatch .hex{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;opacity:.85;}
  .label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;}
</style></head><body>
<div class="label">Semantic Tokens</div>
<div class="row">
  <div class="swatch" style="background:#fff;"><span class="name">--bg-page</span><span class="hex">#FFFFFF</span></div>
  <div class="swatch" style="background:#FAFAFA;"><span class="name">--bg-alt</span><span class="hex">#FAFAFA</span></div>
  <div class="swatch" style="background:#171717;color:#fff;border:none;"><span class="name">--bg-dark</span><span class="hex">#171717 (footer + dark cards)</span></div>
  <div class="swatch" style="background:#fff;"><span class="name">--fg-1 / --fg-2</span><span class="hex" style="color:#171717;font-weight:700;">heading</span><span class="hex" style="color:#525252;">body copy</span></div>
</div>
<div class="row" style="margin-top:10px;">
  <div class="swatch" style="background:#fff;"><span class="name" style="color:#138510;">.eyebrow (green)</span><span class="hex" style="color:#138510;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-body);">PARTNER FOCUS</span></div>
  <div class="swatch" style="background:#fff;"><span class="name" style="color:#FF5E1A;">.accent (orange)</span><span class="hex" style="color:#FF5E1A;font-weight:600;">View Case Studies →</span></div>
</div>
</body></html>
