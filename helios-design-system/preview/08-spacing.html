<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Spacing — 8px base</div>
<div style="display:flex;flex-direction:column;gap:8px;">

  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-1</div>
    <div style="height:14px;width:8px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">4px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-2</div>
    <div style="height:14px;width:16px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">8px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-3</div>
    <div style="height:14px;width:24px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">12px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-4</div>
    <div style="height:14px;width:32px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">16px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-5</div>
    <div style="height:14px;width:48px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">24px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-6</div>
    <div style="height:14px;width:64px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">32px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-7</div>
    <div style="height:14px;width:96px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">48px</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:60px;font-family:var(--font-heading);font-size:11px;font-weight:700;">--s-8</div>
    <div style="height:14px;width:128px;background:#FF5E1A;border-radius:3px;"></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);">64px</div>
  </div>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:12px;">Section padding: --s-9 (96px) or --s-10 (128px). Container px: --s-5 (24px). Container max: 1280px.</div>
</body></html>
