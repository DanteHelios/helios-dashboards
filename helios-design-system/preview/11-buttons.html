<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Buttons (always rounded-full)</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
  <button style="all:unset;cursor:pointer;padding:14px 28px;background:#FF5E1A;color:#fff;border-radius:9999px;font-family:var(--font-body);font-weight:700;font-size:16px;box-shadow:0 0 40px -10px #FF5E1A;display:inline-flex;align-items:center;gap:8px;">Book a Call →</button>
  <button style="all:unset;cursor:pointer;padding:14px 28px;background:#fff;color:#171717;border:2px solid #E5E5E5;border-radius:9999px;font-family:var(--font-body);font-weight:600;font-size:16px;">View Case Studies</button>
  <button style="all:unset;cursor:pointer;padding:10px 20px;background:#138510;color:#fff;border-radius:9999px;font-family:var(--font-body);font-weight:600;font-size:14px;">Book a Call</button>
  <button style="all:unset;cursor:pointer;padding:10px 20px;background:#171717;color:#fff;border-radius:9999px;font-family:var(--font-body);font-weight:600;font-size:14px;">Apply for Retainer</button>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:14px;">Primary: orange + glow shadow + ArrowRight. Secondary: white + 2px neutral-200 border. Header CTA scrolled: green pill.</div>
</body></html>
