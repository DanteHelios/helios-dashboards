<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}body{padding:20px 24px;}.label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;}</style></head><body>
<div class="label">Footer Surface</div>
<div style="background:#171717;color:#A3A3A3;padding:20px;border-radius:10px;display:grid;grid-template-columns:1.4fr 1fr 1.2fr;gap:24px;">
  <div>
    <img src="../assets/Helios-logo.png" style="height:30px;filter:brightness(0) invert(1);margin-bottom:10px;">
    <p style="margin:0 0 10px;font-size:12px;font-weight:300;line-height:1.5;color:#737373;">AI marketing systems that scale your operations, allowing you to focus on strategy.</p>
    <span style="color:#FF5E1A;font-weight:500;font-size:12px;">@heliosmarketingg</span>
  </div>
  <div>
    <div style="color:#fff;font-family:var(--font-heading);font-weight:700;font-size:13px;margin-bottom:8px;">Platform</div>
    <div style="font-size:12px;line-height:1.7;">Pricing<br>Case Studies</div>
  </div>
  <div>
    <div style="color:#fff;font-family:var(--font-heading);font-weight:700;font-size:13px;margin-bottom:8px;">Contact Us</div>
    <div style="position:relative;">
      <input placeholder="Message us..." style="width:100%;box-sizing:border-box;background:#262626;border:1px solid #404040;border-radius:9999px;padding:8px 38px 8px 14px;color:#fff;font-size:11px;outline:none;">
      <button style="all:unset;position:absolute;right:3px;top:3px;width:24px;height:24px;background:#FF5E1A;color:#fff;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:11px;">→</button>
    </div>
  </div>
</div>
</body></html>
